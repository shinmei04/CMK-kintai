<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>勤怠・請求メモ</title>
  <style>
    :root {
      --background: #f2f2f7;
      --surface: #ffffff;
      --text-primary: #1c1c1e;
      --text-secondary: #8e8e93;
      --separator: rgba(60, 60, 67, 0.18);
      --accent: #007aff;
      --danger: #ff3b30;
      --success: #34c759;
      --focus: rgba(0, 122, 255, 0.22);
      --sheet-overlay: rgba(0, 0, 0, 0.36);
      --page-padding: 20px;
      --row-padding: 16px;
      --section-gap: 32px;
      --row-height: 52px;
      --label-width: 112px;
      --radius: 10px;
      --page-width: 680px;
      --nav-height: 64px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--background);
    }

    body {
      min-height: 100%;
      margin: 0;
      background: var(--background);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Noto Sans JP", sans-serif;
      font-size: 16px;
      line-height: 1.45;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      color: inherit;
      letter-spacing: 0;
    }

    button {
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    button:disabled,
    input:disabled,
    select:disabled,
    textarea:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    input,
    select,
    textarea {
      min-height: 44px;
      min-width: 0;
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      color: var(--text-primary);
      font-size: 16px;
      outline: none;
    }

    textarea {
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus,
    button:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    .app-shell {
      width: 100%;
      max-width: var(--page-width);
      min-height: 100vh;
      margin: 0 auto;
      padding: 20px var(--page-padding) calc(var(--nav-height) + env(safe-area-inset-bottom) + 20px);
    }

    .desktop-nav {
      display: none;
    }

    .test-mode {
      margin: 4px 0 18px;
      padding: 10px 12px;
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 400;
    }

    .page {
      display: none;
      animation: fadeIn 180ms ease;
    }

    .page.active {
      display: block;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 8px 0 var(--section-gap);
    }

    .page-title {
      margin: 0;
      font-size: 31px;
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: 0;
    }

    .page-subtitle,
    .month-picker-label {
      margin: 18px 0 0;
      color: var(--text-secondary);
      font-size: 16px;
      font-weight: 400;
    }

    .month-picker {
      width: 132px;
      min-height: 34px;
      padding: 0;
      border: 0;
      text-align: right;
      color: var(--text-secondary);
      font-size: 15px;
      font-weight: 400;
    }

    .section {
      margin-top: var(--section-gap);
    }

    .section-title {
      margin: 0 0 8px;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0;
    }

    .group-list {
      overflow: hidden;
      border-radius: var(--radius);
      background: var(--surface);
    }

    .outside-card-label {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      min-height: 22px;
      margin: 0 0 6px;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      line-height: 1.3;
    }

    .outside-card-label h2 {
      margin: 0;
      color: inherit;
      font: inherit;
    }

    .group-list + .primary-button,
    .group-list + .secondary-button {
      margin-top: 16px;
    }

    .list-row {
      display: grid;
      grid-template-columns: minmax(88px, var(--label-width)) minmax(0, 1fr);
      align-items: center;
      min-height: var(--row-height);
      padding: 0 var(--row-padding);
      border-bottom: 1px solid var(--separator);
      column-gap: 12px;
      background: var(--surface);
    }

    .list-row:last-child {
      border-bottom: 0;
    }

    .list-row.no-separator {
      border-bottom: 0;
    }

    .list-row.tall {
      align-items: start;
      padding-top: 10px;
      padding-bottom: 10px;
    }

    .list-label {
      min-width: 0;
      color: var(--text-primary);
      font-size: 16px;
      font-weight: 400;
    }

    .list-value {
      min-width: 0;
      color: var(--text-primary);
      font-size: 16px;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .list-value.muted {
      color: var(--text-secondary);
    }

    .work-content-trigger {
      width: 100%;
      text-align: left;
    }

    .work-content-trigger .list-value {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
    }

    .work-content-trigger .icon {
      width: 14px;
      height: 14px;
      color: var(--text-secondary);
      flex: 0 0 auto;
    }

    #summaryGroup .list-row {
      grid-template-columns: minmax(128px, 1fr) auto;
    }

    .row-input,
    .row-select,
    .row-textarea {
      width: 100%;
      padding: 8px 0 8px 8px;
      border: 0;
      border-radius: 6px;
      text-align: right;
    }

    .row-textarea {
      min-height: 72px;
      text-align: left;
    }

    .inline-help {
      margin-top: 8px;
      color: var(--text-secondary);
      font-size: 13px;
    }

    .status-block {
      margin-top: 22px;
    }

    .status-line {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-primary);
      font-size: 16px;
      font-weight: 500;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--text-secondary);
    }

    .status-dot.active {
      background: var(--success);
    }

    .elapsed-time {
      margin-top: 12px;
      font-size: clamp(46px, 13vw, 62px);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      font-weight: 400;
      letter-spacing: 0;
    }

    .work-content {
      margin-top: 14px;
      color: var(--text-secondary);
      font-size: 20px;
      font-weight: 400;
      word-break: break-word;
    }

    .work-detail {
      margin-top: 2px;
      color: var(--text-secondary);
      font-size: 15px;
    }

    .salary-summary {
      margin: calc(var(--section-gap) * -0.35) 0 var(--section-gap);
    }

    .salary-label {
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 400;
    }

    .salary-amount {
      margin-top: 4px;
      font-size: 38px;
      line-height: 1.08;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .salary-note {
      margin-top: 4px;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 400;
    }

    .primary-button,
    .secondary-button,
    .danger-text-button {
      width: 100%;
      min-height: 50px;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 600;
    }

    .primary-button {
      margin-top: 22px;
      background: var(--accent);
      color: #fff;
    }

    .secondary-button {
      border: 1px solid var(--separator);
      background: var(--surface);
      color: var(--accent);
    }

    .danger-text-button {
      color: var(--danger);
    }

    .small-link-button {
      min-height: 32px;
      padding: 0;
      color: var(--accent);
      font-size: 15px;
      font-weight: 500;
      text-align: right;
    }

    .quick-section {
      background: transparent;
      padding: 6px 0 4px;
    }

    .quick-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 34px;
      padding: 2px var(--row-padding) 0;
    }

    .quick-header .list-label {
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
    }

    .quick-list {
      display: flex;
      flex-wrap: wrap;
      column-gap: 18px;
      row-gap: 0;
      padding: 0 var(--row-padding) 10px;
    }

    .quick-button {
      min-height: 44px;
      padding: 0;
      border-radius: 0;
      background: transparent;
      color: var(--accent);
      font-size: 15px;
      font-weight: 500;
      text-align: center;
      white-space: nowrap;
    }

    .quick-button:active {
      color: #005ecb;
    }

    .dialog-field {
      margin-top: 18px;
    }

    .dialog-field-label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
    }

    .dialog-textarea {
      width: 100%;
      min-height: 96px;
      padding: 12px;
      border: 0;
      border-radius: var(--radius);
      background: var(--background);
      text-align: left;
    }

    .history-day {
      margin-top: 26px;
    }

    .history-day-title {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.25;
      font-weight: 600;
    }

    .history-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(64px, auto) 16px;
      align-items: center;
      width: 100%;
      min-height: 68px;
      padding: 10px var(--row-padding);
      border-bottom: 1px solid var(--separator);
      background: var(--surface);
      color: var(--text-primary);
      text-align: left;
      column-gap: 12px;
    }

    .history-row:last-child {
      border-bottom: 0;
    }

    .history-kind {
      color: var(--text-primary);
      font-size: 15px;
      font-weight: 500;
    }

    .history-main {
      margin-top: 2px;
      color: var(--text-primary);
      font-size: 15px;
      font-weight: 400;
      word-break: break-word;
    }

    .history-sub {
      margin-top: 3px;
      color: var(--text-secondary);
      font-size: 14px;
      font-variant-numeric: tabular-nums;
    }

    .history-value {
      color: var(--text-primary);
      font-size: 15px;
      font-weight: 400;
      font-variant-numeric: tabular-nums;
      text-align: right;
      white-space: nowrap;
    }

    .empty-state {
      padding: 18px 14px;
      color: var(--text-secondary);
      font-size: 15px;
      text-align: center;
    }

    .warning-list {
      display: grid;
      gap: 6px;
      margin-top: 16px;
    }

    .warning-item {
      padding: 0;
      background: transparent;
      color: var(--danger);
      font-size: 14px;
      font-weight: 400;
    }

    .copy-area {
      width: 100%;
      min-height: 160px;
      margin-top: 16px;
      padding: 12px 0;
      border: 0;
      border-top: 1px solid var(--separator);
      border-radius: 0;
      background: var(--surface);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 14px;
      text-align: left;
    }

    .tab-bar {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 18;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      height: calc(var(--nav-height) + env(safe-area-inset-bottom));
      padding: 4px 8px env(safe-area-inset-bottom);
      border-top: 1px solid var(--separator);
      background: rgba(248, 248, 248, 0.82);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .tab-button {
      display: grid;
      place-items: center;
      align-content: center;
      gap: 2px;
      min-height: 50px;
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 500;
    }

    .tab-button.active {
      color: var(--accent);
    }

    .tab-icon {
      width: 24px;
      height: 24px;
      color: currentColor;
    }

    .icon {
      display: block;
      width: 100%;
      height: 100%;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .chevron-icon {
      width: 16px;
      height: 16px;
      color: var(--text-secondary);
    }

    .hidden {
      display: none !important;
    }

    .sheet-overlay {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      align-items: end;
      background: var(--sheet-overlay);
      opacity: 1;
      transition: opacity 220ms ease;
    }

    .edit-sheet {
      width: 100%;
      max-height: min(88vh, 760px);
      overflow: auto;
      padding: 8px var(--page-padding) calc(18px + env(safe-area-inset-bottom));
      border-radius: 16px 16px 0 0;
      background: var(--background);
      transform: translateY(0);
      transition: transform 220ms ease;
    }

    .sheet-handle {
      width: 36px;
      height: 5px;
      margin: 0 auto 12px;
      border-radius: 999px;
      background: #a9a9b1;
    }

    .sheet-toolbar {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr) 88px;
      align-items: center;
      min-height: 44px;
      margin-bottom: 8px;
    }

    .sheet-title {
      margin: 0;
      overflow: hidden;
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sheet-action {
      min-height: 44px;
      color: var(--accent);
      font-size: 16px;
      font-weight: 500;
    }

    .sheet-action:first-child {
      text-align: left;
    }

    .sheet-action:last-child {
      text-align: right;
    }

    .sheet-message {
      min-height: 24px;
      margin: 0 4px 8px;
      color: var(--danger);
      font-size: 14px;
      font-weight: 400;
    }

    .sheet-saving {
      margin: 0 4px 8px;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 400;
    }

    .edit-section {
      margin-top: 18px;
    }

    .delete-area {
      margin-top: 24px;
      border-top: 1px solid var(--separator);
    }

    .delete-area .danger-text-button {
      border-radius: 0;
    }

    dialog {
      width: min(calc(100% - 28px), 480px);
      border: 0;
      border-radius: 14px;
      padding: 0;
      background: var(--surface);
      color: var(--text-primary);
    }

    dialog::backdrop {
      background: rgba(0, 0, 0, 0.32);
    }

    .dialog-body {
      padding: 18px;
    }

    .dialog-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .dialog-title {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
    }

    .icon-button {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      color: var(--text-secondary);
    }

    .quick-inputs {
      display: grid;
      gap: 10px;
    }

    .toast {
      position: fixed;
      right: 14px;
      bottom: calc(var(--nav-height) + env(safe-area-inset-bottom) + 12px);
      left: 14px;
      z-index: 50;
      display: none;
      max-width: 680px;
      margin: 0 auto;
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(28, 28, 30, 0.94);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
    }

    .toast.show {
      display: block;
    }

    .toast.error {
      background: var(--danger);
    }

    @media (min-width: 760px) {
      .app-shell {
        max-width: var(--page-width);
        padding: 28px var(--page-padding) 48px;
      }

      .desktop-nav {
        position: sticky;
        top: 0;
        z-index: 12;
        display: flex;
        justify-content: center;
        margin: 0 0 28px;
        padding: 8px;
        border-radius: 12px;
        background: var(--surface);
      }

      .desktop-nav .tab-button {
        display: inline-flex;
        flex: 1 1 0;
        min-height: 40px;
        justify-content: center;
        border-radius: 9px;
        font-size: 14px;
        gap: 6px;
      }

      .desktop-nav .tab-button.active {
        background: rgba(0, 122, 255, 0.10);
      }

      .desktop-nav .tab-icon {
        width: 18px;
        height: 18px;
      }

      .tab-bar {
        display: none;
      }

      .page-header {
        margin-top: 0;
      }

      .page-title {
        font-size: 34px;
      }

      .sheet-overlay {
        align-items: center;
        justify-items: center;
        padding: 24px;
      }

      .edit-sheet {
        width: min(100%, 540px);
        max-height: min(86vh, 760px);
        border-radius: 16px;
        padding: 8px var(--page-padding) 18px;
      }

      .toast {
        bottom: 18px;
      }
    }

    @media (max-width: 420px) {
      :root {
        --label-width: 100px;
      }

      .history-row {
        grid-template-columns: minmax(0, 1fr) auto 14px;
        column-gap: 8px;
      }
    }

    @media (max-width: 340px) {
      :root {
        --page-padding: 16px;
        --row-padding: 14px;
        --label-width: 96px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <nav class="desktop-nav" aria-label="画面切り替え">
      <button class="tab-button active" type="button" data-tab="today" aria-label="勤怠を表示">
        <span class="tab-icon" aria-hidden="true">
          <svg class="icon" viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="14" rx="2"></rect><path d="M8 3v4M16 3v4M4 10h16M8 14h4"></path></svg>
        </span>
        <span>勤怠</span>
      </button>
      <button class="tab-button" type="button" data-tab="history" aria-label="履歴を表示">
        <span class="tab-icon" aria-hidden="true">
          <svg class="icon" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"></path><path d="M17 16l2 2 3-4"></path></svg>
        </span>
        <span>履歴</span>
      </button>
      <button class="tab-button" type="button" data-tab="summary" aria-label="集計を表示">
        <span class="tab-icon" aria-hidden="true">
          <svg class="icon" viewBox="0 0 24 24"><path d="M5 19V11M12 19V5M19 19v-7"></path><path d="M4 19h16"></path></svg>
        </span>
        <span>集計</span>
      </button>
    </nav>

    <div id="testModeBanner" class="test-mode hidden">PCテストモード：保存先はこのブラウザです。Apps Script公開後はスプレッドシートに保存されます。</div>

    <main>
      <section id="pageToday" class="page active" aria-labelledby="todayTitle">
        <header class="page-header">
          <div>
            <h1 id="todayTitle" class="page-title">勤怠</h1>
            <p id="todayLabel" class="page-subtitle">読み込み中...</p>
          </div>
        </header>

        <div id="workStatusArea" class="status-block"></div>

        <section class="section" aria-labelledby="lessonTitle">
          <div class="outside-card-label">
            <h2 id="lessonTitle">レッスン</h2>
          </div>
          <div id="lessonGroup" class="group-list">
            <label class="list-row" for="lessonKoma">
              <span class="list-label">コマ数</span>
              <select id="lessonKoma" class="row-select" aria-label="講師業務のコマ数">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
              </select>
            </label>
            <div id="lessonItems"></div>
          </div>
          <button id="saveLessonButton" class="primary-button" type="button">講師業務を登録</button>
        </section>
      </section>

      <section id="pageHistory" class="page" aria-labelledby="historyTitle">
        <header class="page-header">
          <div>
            <h1 id="historyTitle" class="page-title">履歴</h1>
          </div>
          <label>
            <span class="month-picker-label hidden">対象月</span>
            <input id="historyMonth" class="month-picker" type="month" aria-label="履歴の対象月">
          </label>
        </header>
        <div id="historyList"></div>
      </section>

      <section id="pageSummary" class="page" aria-labelledby="summaryTitle">
        <header class="page-header">
          <div>
            <h1 id="summaryTitle" class="page-title">集計</h1>
          </div>
          <label>
            <span class="month-picker-label hidden">対象月</span>
            <input id="summaryMonth" class="month-picker" type="month" aria-label="集計の対象月">
          </label>
        </header>

        <section class="salary-summary" aria-labelledby="salaryTitle">
          <div id="salaryTitle" class="salary-label">給与見込み</div>
          <div id="salaryAmount" class="salary-amount">--</div>
          <div class="salary-note">登録内容をもとにした概算です</div>
        </section>

        <div id="summaryGroup" class="group-list"></div>
        <div id="summaryWarnings" class="warning-list"></div>
        <button id="copyTextButton" class="primary-button" type="button" disabled>コピー用テキストを作成</button>
        <textarea id="copyText" class="copy-area hidden" readonly aria-label="コピー用テキスト"></textarea>
      </section>
    </main>
  </div>

  <nav class="tab-bar" aria-label="画面切り替え">
    <button class="tab-button active" type="button" data-tab="today" aria-label="勤怠を表示">
      <span class="tab-icon" aria-hidden="true">
        <svg class="icon" viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="14" rx="2"></rect><path d="M8 3v4M16 3v4M4 10h16M8 14h4"></path></svg>
      </span>
      <span>勤怠</span>
    </button>
    <button class="tab-button" type="button" data-tab="history" aria-label="履歴を表示">
      <span class="tab-icon" aria-hidden="true">
        <svg class="icon" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"></path><path d="M17 16l2 2 3-4"></path></svg>
      </span>
      <span>履歴</span>
    </button>
    <button class="tab-button" type="button" data-tab="summary" aria-label="集計を表示">
      <span class="tab-icon" aria-hidden="true">
        <svg class="icon" viewBox="0 0 24 24"><path d="M5 19V11M12 19V5M19 19v-7"></path><path d="M4 19h16"></path></svg>
      </span>
      <span>集計</span>
    </button>
  </nav>

  <div id="editOverlay" class="sheet-overlay hidden" aria-hidden="true">
    <section class="edit-sheet" role="dialog" aria-modal="true" aria-labelledby="editSheetTitle">
      <div class="sheet-handle" aria-hidden="true"></div>
      <div class="sheet-toolbar">
        <button id="cancelEditButton" class="sheet-action" type="button">キャンセル</button>
        <h2 id="editSheetTitle" class="sheet-title">勤務実績を編集</h2>
        <button id="saveEditButton" class="sheet-action" type="button">完了</button>
      </div>
      <div id="editSheetSaving" class="sheet-saving hidden" role="status">保存中...</div>
      <div id="editSheetError" class="sheet-message" role="alert"></div>
      <div id="editFields"></div>
      <div class="delete-area">
        <button id="deleteLogButton" class="danger-text-button" type="button">この勤務実績を削除</button>
      </div>
    </section>
  </div>

  <dialog id="workContentDialog">
    <div class="dialog-body">
      <div class="dialog-header">
        <h2 class="dialog-title">出勤時の内容</h2>
        <button id="closeWorkContentButton" class="icon-button" type="button" aria-label="閉じる">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"></path></svg>
        </button>
      </div>
      <div class="quick-section">
        <div class="quick-header">
          <span class="list-label">クイック入力</span>
          <button id="editQuickItemsFromContentButton" class="small-link-button" type="button">編集</button>
        </div>
        <div id="workContentQuickButtons" class="quick-list"></div>
      </div>
      <div class="dialog-field">
        <label class="dialog-field-label" for="workContentDraft">自由入力</label>
        <textarea id="workContentDraft" class="dialog-textarea" aria-label="出勤時の内容を自由入力" placeholder="例：ULMTG"></textarea>
      </div>
      <button id="applyWorkContentButton" class="primary-button" type="button">決定</button>
    </div>
  </dialog>

  <dialog id="quickItemsDialog">
    <div class="dialog-body">
      <div class="dialog-header">
        <h2 class="dialog-title">クイック入力を編集</h2>
        <button id="closeQuickItemsButton" class="icon-button" type="button" aria-label="閉じる">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"></path></svg>
        </button>
      </div>
      <div id="quickItemInputs" class="quick-inputs"></div>
      <button id="saveQuickItemsButton" class="primary-button" type="button">保存</button>
    </div>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    const LESSON_CONTENT_OPTIONS = [
      'CB',
      'CS',
      'MJ',
      'MS',
      'CE',
      'プラコ',
      '体験会',
      '振替',
      '補講',
      'キャンプ',
      'その他・要確認',
    ];
    const LESSON_BILLING_RULES = {
      CB: '通常コマ',
      CS: '通常コマ',
      MJ: '通常コマ',
      MS: '通常コマ',
      CE: '通常コマ',
      'プラコ': '通常コマ',
      '体験会': '通常コマ',
      '振替': '通常コマ',
      '補講': '通常コマ',
      'キャンプ': 'キャンプ',
      'その他・要確認': 'その他・要確認',
    };
    const LESSON_CONTENT_ALIASES = {
      'キャンプ10時': 'キャンプ',
      'キャンプその他': 'キャンプ',
      'キャンプ(10時)': 'キャンプ',
    };
    const LOCAL_STORAGE_KEY = 'kintai_logs_pc_test_v1';
    const LOCAL_QUICK_ITEMS_KEY = 'kintai_work_quick_items_v1';
    const DEFAULT_WORK_QUICK_ITEMS = ['ULMTG', 'CBULMTG', 'チームMTG', 'UL業務'];
    const WORK_CATEGORIES = ['教材開発', 'SNS', '研修', 'その他MTGなど'];
    const LESSON_CATEGORIES = ['通常コマ', 'キャンプ', 'その他・要確認'];
    const LESSON_PAY_PER_KOMA = 2200;
    const CAMP_LESSON_PAY_PER_KOMA = 2350;
    const WORK_HOURLY_PAY = 1300;

    const state = {
      currentTab: 'today',
      todayIso: '',
      currentMonth: '',
      lessonItemOptions: LESSON_CONTENT_OPTIONS.slice(),
      workCategories: WORK_CATEGORIES.slice(),
      workQuickItems: DEFAULT_WORK_QUICK_ITEMS.slice(),
      activeWork: null,
      historyLogs: [],
      summary: null,
      editingLog: null,
      editSaving: false,
      editDeleting: false,
      startWorkContent: '',
      timerId: null,
      busy: false,
      historyDirty: false,
      summaryDirty: false,
      historyLoadedMonth: '',
      summaryLoadedMonth: '',
    };

    document.addEventListener('DOMContentLoaded', () => {
      bindStaticEvents();
      loadApp();
    });

    function bindStaticEvents() {
      document.querySelectorAll('[data-tab]').forEach((button) => {
        button.addEventListener('click', () => switchTab(button.dataset.tab));
      });
      $('lessonKoma').addEventListener('change', renderLessonItemRows);
      $('saveLessonButton').addEventListener('click', saveLesson);
      $('historyMonth').addEventListener('change', () => loadHistoryMonth($('historyMonth').value));
      $('summaryMonth').addEventListener('change', () => loadMonthlySummary($('summaryMonth').value));
      $('copyTextButton').addEventListener('click', createCopyText);
      $('cancelEditButton').addEventListener('click', closeEditSheet);
      $('saveEditButton').addEventListener('click', saveEditedLog);
      $('deleteLogButton').addEventListener('click', deleteEditedLog);
      $('editOverlay').addEventListener('click', (event) => {
        if (event.target === $('editOverlay')) {
          closeEditSheet();
        }
      });
      $('closeWorkContentButton').addEventListener('click', closeWorkContentDialog);
      $('applyWorkContentButton').addEventListener('click', applyWorkContentDialog);
      $('editQuickItemsFromContentButton').addEventListener('click', openQuickItemsDialog);
      $('closeQuickItemsButton').addEventListener('click', closeQuickItemsDialog);
      $('saveQuickItemsButton').addEventListener('click', saveQuickItems);
    }

    async function loadApp() {
      try {
        setBusy(true);
        const data = await gas('getInitialData');
        state.todayIso = data.todayIso;
        state.currentMonth = data.currentMonth;
        state.lessonItemOptions = data.lessonContentOptions || data.lessonItemOptions || LESSON_CONTENT_OPTIONS.slice();
        state.workCategories = data.workCategories || WORK_CATEGORIES.slice();
        state.workQuickItems = normalizeQuickItemsClient(data.workQuickItems || DEFAULT_WORK_QUICK_ITEMS);
        state.activeWork = data.activeWork || null;
        state.historyLogs = Array.isArray(data.historyLogs) ? data.historyLogs : [];
        state.summary = data.monthlySummary || null;
        state.historyLoadedMonth = data.currentMonth;
        state.summaryLoadedMonth = state.summary ? data.currentMonth : '';

        $('todayLabel').textContent = addWeekdayToDisplay(data.todayIso, data.todayDisplay);
        $('historyMonth').value = data.currentMonth;
        $('summaryMonth').value = data.currentMonth;
        $('testModeBanner').classList.toggle('hidden', hasAppsScript());

        renderLessonItemRows();
        renderToday();
        renderHistoryLogs();
        if (state.summary) {
          renderSummary(state.summary);
        } else {
          await loadMonthlySummary(data.currentMonth, { silent: true });
        }
      } catch (error) {
        showError(error);
      } finally {
        setBusy(false);
      }
    }

    async function refreshAfterMutation(result, fallbackMessage) {
      if (result && Object.prototype.hasOwnProperty.call(result, 'activeWork')) {
        state.activeWork = result.activeWork || null;
      }
      renderToday();
      state.historyDirty = true;
      state.summaryDirty = true;

      if (state.currentTab === 'history') {
        await loadHistoryMonth($('historyMonth').value || state.currentMonth, { silent: true });
      } else if (state.currentTab === 'summary') {
        await loadMonthlySummary($('summaryMonth').value || state.currentMonth, { silent: true });
      }

      const message = result && result.message ? result.message : fallbackMessage;
      if (message) {
        showToast(message);
      }
    }

    function switchTab(tabName) {
      state.currentTab = tabName;
      document.querySelectorAll('.page').forEach((page) => {
        page.classList.toggle('active', page.id === `page${capitalize(tabName)}`);
      });
      document.querySelectorAll('[data-tab]').forEach((button) => {
        const active = button.dataset.tab === tabName;
        button.classList.toggle('active', active);
        button.setAttribute('aria-current', active ? 'page' : 'false');
      });
      const historyMonth = $('historyMonth').value || state.currentMonth;
      const summaryMonth = $('summaryMonth').value || state.currentMonth;
      if (tabName === 'history' && (state.historyDirty || state.historyLoadedMonth !== historyMonth)) {
        loadHistoryMonth(historyMonth);
      }
      if (tabName === 'summary' && (state.summaryDirty || state.summaryLoadedMonth !== summaryMonth)) {
        loadMonthlySummary(summaryMonth);
      }
    }

    function renderToday() {
      renderWorkStatus();
      renderLessonItemRows();
    }

    function renderWorkStatus() {
      const area = $('workStatusArea');
      clear(area);
      stopElapsedTimer();

      if (state.activeWork) {
        const status = createEl('div', { className: 'status-line' }, [
          createEl('span', { className: 'status-dot active', ariaHidden: 'true' }),
          '勤務中',
        ]);
        const elapsed = createEl('div', { className: 'elapsed-time', id: 'elapsedTime' }, '00:00:00');
        const content = createEl('div', { className: 'work-content' }, state.activeWork.content || '内容なし');
        const detail = createEl('div', { className: 'work-detail' }, `${state.activeWork.start || '--:--'}から勤務しています`);
        const finishButton = createEl('button', { className: 'primary-button', type: 'button', id: 'finishWorkButton' }, '退勤する');
        finishButton.addEventListener('click', finishWork);
        const cancelButton = createEl('button', { className: 'danger-text-button', type: 'button', id: 'cancelActiveWorkButton' }, '出勤を取り消す');
        cancelButton.addEventListener('click', cancelActiveWork);
        area.append(status, elapsed, content, detail, finishButton, cancelButton);
        startElapsedTimer();
        return;
      }

      const status = createEl('div', { className: 'status-line' }, [
        createEl('span', { className: 'status-dot', ariaHidden: 'true' }),
        '勤務していません',
      ]);
      const group = createEl('div', { className: 'group-list' });
      const categoryRow = createSelectRow('startWorkCategory', '分類', state.workCategories, 'その他MTGなど');
      group.append(
        createWorkContentPickerRow(),
        categoryRow
      );
      const outsideLabel = createEl('div', { className: 'outside-card-label', style: 'margin-top: 14px;' }, '講師外業務');

      const startButton = createEl('button', { className: 'primary-button', type: 'button', id: 'startWorkButton' }, '出勤する');
      startButton.addEventListener('click', confirmStartWork);
      area.append(status, outsideLabel, group, startButton);
      updateWorkContentDisplay();
    }

    function createWorkContentPickerRow() {
      const button = createEl('button', {
        className: 'list-row work-content-trigger',
        type: 'button',
        id: 'startWorkContentPicker',
        ariaLabel: '出勤時の内容を選択または入力',
      });
      const value = createEl('span', { className: 'list-value muted', id: 'startWorkContentValue' }, [
        createEl('span', { id: 'startWorkContentText' }, '選択または入力'),
        chevronIcon(),
      ]);
      button.append(createEl('span', { className: 'list-label' }, '出勤時の内容'), value);
      button.addEventListener('click', openWorkContentDialog);
      return button;
    }

    function createInputRow(id, labelText, inputType, placeholder) {
      const label = createEl('label', { className: 'list-row tall', htmlFor: id });
      const labelSpan = createEl('span', { className: 'list-label' }, labelText);
      const control = inputType === 'textarea'
        ? createEl('textarea', { id, className: 'row-textarea', ariaLabel: labelText, placeholder })
        : createEl('input', { id, className: 'row-input', type: inputType, ariaLabel: labelText, placeholder });
      label.append(labelSpan, control);
      return label;
    }

    function createSelectRow(id, labelText, options, selectedValue) {
      const label = createEl('label', { className: 'list-row', htmlFor: id });
      const labelSpan = createEl('span', { className: 'list-label' }, labelText);
      const select = createEl('select', { id, className: 'row-select', ariaLabel: labelText });
      fillSelect(select, options);
      if (selectedValue) select.value = selectedValue;
      label.append(labelSpan, select);
      return label;
    }

    function renderWorkContentQuickButtons() {
      const container = $('workContentQuickButtons');
      if (!container) return;
      clear(container);
      state.workQuickItems.forEach((item) => {
        const button = createEl('button', { className: 'quick-button', type: 'button' }, item);
        button.addEventListener('click', () => {
          setStartWorkContent(item);
          closeWorkContentDialog();
        });
        container.appendChild(button);
      });
    }

    function openWorkContentDialog() {
      renderWorkContentQuickButtons();
      $('workContentDraft').value = state.startWorkContent || '';
      const dialog = $('workContentDialog');
      if (dialog.showModal) {
        dialog.showModal();
      } else {
        dialog.setAttribute('open', 'open');
      }
      $('workContentDraft').focus();
    }

    function closeWorkContentDialog() {
      const dialog = $('workContentDialog');
      if (dialog.close) {
        dialog.close();
      } else {
        dialog.removeAttribute('open');
      }
    }

    function applyWorkContentDialog() {
      setStartWorkContent($('workContentDraft').value);
      closeWorkContentDialog();
    }

    function setStartWorkContent(value) {
      state.startWorkContent = String(value || '').trim();
      updateWorkContentDisplay();
    }

    function updateWorkContentDisplay() {
      const text = $('startWorkContentText');
      const value = $('startWorkContentValue');
      if (!text || !value) return;
      if (state.startWorkContent) {
        text.textContent = state.startWorkContent;
        value.classList.remove('muted');
      } else {
        text.textContent = '選択または入力';
        value.classList.add('muted');
      }
    }

    function renderLessonItemRows() {
      const count = clampKoma($('lessonKoma').value);
      $('lessonKoma').value = String(count);
      const container = $('lessonItems');
      clear(container);
      for (let index = 0; index < count; index += 1) {
        const row = createEl('label', { className: 'list-row', htmlFor: `lessonItem${index}` });
        const select = createEl('select', {
          id: `lessonItem${index}`,
          className: 'row-select lesson-item-select',
          ariaLabel: `${index + 1}コマ目`,
        });
        fillSelect(select, state.lessonItemOptions);
        row.append(createEl('span', { className: 'list-label' }, `${index + 1}コマ目`), select);
        container.appendChild(row);
      }
    }

    async function confirmStartWork() {
      if (state.busy) return;
      const content = state.startWorkContent.trim();
      if (!content) {
        showToast('出勤時の内容を入力してください', true);
        return;
      }
      const payload = {
        content,
        category: $('startWorkCategory').value,
        note: '',
      };
      try {
        setBusy(true);
        const result = await gas('startWork', payload);
        state.startWorkContent = '';
        await refreshAfterMutation(result, '出勤しました');
      } catch (error) {
        showError(error);
      } finally {
        setBusy(false);
      }
    }

    async function finishWork() {
      if (state.busy) return;
      try {
        setBusy(true);
        const result = await gas('finishWork');
        await refreshAfterMutation(result, '退勤しました');
      } catch (error) {
        showError(error);
      } finally {
        setBusy(false);
      }
    }

    async function cancelActiveWork() {
      if (state.busy) return;
      if (!confirm('未退勤の出勤を取り消しますか？この出勤ログは削除されます。')) {
        return;
      }
      try {
        setBusy(true);
        const result = await gas('cancelActiveWork');
        await refreshAfterMutation(result, '出勤を取り消しました');
      } catch (error) {
        showError(error);
      } finally {
        setBusy(false);
      }
    }

    async function saveLesson() {
      if (state.busy) return;
      const lessonItems = getLessonItemValues();
      const koma = clampKoma($('lessonKoma').value);
      if (lessonItems.length !== koma || lessonItems.some((item) => !item)) {
        showToast('コマ内容を選択してください', true);
        return;
      }
      const payload = {
        date: state.todayIso,
        koma,
        lessonItems,
        content: lessonItems.join(' / '),
        note: '',
      };

      try {
        setBusy(true);
        const result = await gas('saveLesson', payload);
        $('lessonKoma').value = '1';
        renderLessonItemRows();
        await refreshAfterMutation(result, '講師業務を登録しました');
      } catch (error) {
        showError(error);
      } finally {
        setBusy(false);
      }
    }

    function getLessonItemValues(scope = document) {
      return Array.from(scope.querySelectorAll('.lesson-item-select'))
        .map((select) => select.value)
        .filter(Boolean);
    }

    function startElapsedTimer() {
      updateElapsedTime();
      state.timerId = window.setInterval(updateElapsedTime, 1000);
    }

    function stopElapsedTimer() {
      if (state.timerId) {
        window.clearInterval(state.timerId);
        state.timerId = null;
      }
    }

    function updateElapsedTime() {
      const target = $('elapsedTime');
      if (!target || !state.activeWork) return;
      const startAt = buildClientDateTime(state.activeWork.dateIso, state.activeWork.start);
      if (!startAt) {
        target.textContent = '00:00:00';
        return;
      }
      const elapsedMs = Math.max(0, Date.now() - startAt.getTime());
      target.textContent = formatElapsed(Math.floor(elapsedMs / 1000));
    }

    async function loadHistoryMonth(month, options = {}) {
      if (!month) return;
      try {
        if (!options.silent) setBusy(true);
        state.historyLogs = await gas('getLogsByMonth', month);
        state.historyDirty = false;
        state.historyLoadedMonth = month;
        renderHistoryLogs();
      } catch (error) {
        showError(error);
      } finally {
        if (!options.silent) setBusy(false);
      }
    }

    function renderHistoryLogs() {
      const container = $('historyList');
      clear(container);
      const logs = Array.isArray(state.historyLogs) ? state.historyLogs : [];
      if (!logs.length) {
        container.appendChild(createEl('div', { className: 'group-list' }, [
          createEl('div', { className: 'empty-state' }, 'この月の勤務実績はありません'),
        ]));
        return;
      }

      groupLogsByDate(logs).forEach((group) => {
        const section = createEl('section', { className: 'history-day' });
        section.appendChild(createEl('h2', { className: 'history-day-title' }, formatDateHeading(group.dateIso, group.dateDisplay)));
        const list = createEl('div', { className: 'group-list' });
        group.logs.forEach((log) => {
          list.appendChild(createHistoryRow(log));
        });
        section.appendChild(list);
        container.appendChild(section);
      });
    }

    function createHistoryRow(log) {
      const button = createEl('button', { className: 'history-row', type: 'button', ariaLabel: `${log.dateDisplay || ''}の${log.type || '勤務実績'}を編集` });
      const main = createEl('div');
      const value = createEl('div', { className: 'history-value' });

      if (log.type === 'レッスン') {
        const lessonItems = getLogLessonItems(log);
        main.append(
          createEl('div', { className: 'history-kind' }, 'レッスン'),
          createEl('div', { className: 'history-main' }, lessonItems.length ? lessonItems.join(' / ') : (log.content || '内容なし')),
          createEl('div', { className: 'history-sub' }, `${log.koma || lessonItems.length || 0}コマ`)
        );
        value.textContent = `${log.koma || lessonItems.length || 0}コマ`;
      } else {
        main.append(
          createEl('div', { className: 'history-kind' }, log.type || '講師外業務'),
          createEl('div', { className: 'history-main' }, log.content || '内容なし'),
          createEl('div', { className: 'history-sub' }, `${log.start || '--:--'}-${log.end || '未退勤'} / ${log.category || '未分類'}`)
        );
        value.textContent = log.end ? formatDuration(getLogMinutes(log)) : '未退勤';
      }

      button.append(main, value, chevronIcon());
      button.addEventListener('click', () => openEditSheet(log));
      return button;
    }

    async function loadMonthlySummary(month, options = {}) {
      if (!month) return;
      try {
        if (!options.silent) setBusy(true);
        const summary = await gas('getMonthlySummary', month);
        state.summary = summary;
        state.summaryDirty = false;
        state.summaryLoadedMonth = month;
        renderSummary(summary);
      } catch (error) {
        showError(error);
      } finally {
        if (!options.silent) setBusy(false);
      }
    }

    function renderSummary(summary) {
      const group = $('summaryGroup');
      clear(group);
      const salary = summary.salarySummary || buildLocalSalarySummary(summary.month);
      $('salaryAmount').textContent = salary ? formatYen(salary.totalPay) : '--';
      group.append(
        createSummaryRow('通常コマ', `${summary.normalKoma || 0}`),
        createSummaryRow('講師外業務', formatDecimalHours(summary.workTotalHours)),
        createSummaryRow('キャンプ', `${getSummaryCampKoma(summary)}`),
        createSummaryRow('要確認件数', `${getSummaryConfirmCount(summary)}`)
      );

      const warnings = $('summaryWarnings');
      clear(warnings);
      (summary.warnings || []).concat(summary.confirmNotes || []).forEach((message) => {
        warnings.appendChild(createEl('div', { className: 'warning-item' }, message));
      });
      $('copyTextButton').disabled = false;
      $('copyText').classList.add('hidden');
      $('copyText').value = '';
    }

    function createSummaryRow(label, value) {
      return createEl('div', { className: 'list-row' }, [
        createEl('span', { className: 'list-label' }, label),
        createEl('span', { className: 'list-value' }, value),
      ]);
    }

    async function createCopyText() {
      if (!state.summary) return;
      const text = buildCopyText(state.summary);
      $('copyText').value = text;
      $('copyText').classList.remove('hidden');
      try {
        await navigator.clipboard.writeText(text);
        showToast('コピー用テキストを作成してコピーしました');
      } catch (error) {
        $('copyText').focus();
        $('copyText').select();
        showToast('コピー用テキストを作成しました。必要に応じて選択してコピーしてください');
      }
    }

    function buildCopyText(summary) {
      const details = summary.details && summary.details.length
        ? summary.details.map((detail) => `${detail.shortDate} ${detail.start}-${detail.end} ${detail.content}`)
        : ['（なし）'];
      const notes = summary.confirmNotes && summary.confirmNotes.length
        ? ['', '要確認メモ', ...summary.confirmNotes]
        : [];
      return [
        `対象月：${summary.monthLabel}`,
        '',
        'レッスン',
        `通常コマ数：${summary.normalKoma}`,
        `キャンプコマ数：${getSummaryCampKoma(summary)}`,
        `レッスン合計コマ数：${summary.lessonTotalKoma}`,
        '',
        '講師外業務',
        `教材開発：${summary.workHours['教材開発']}`,
        `SNS：${summary.workHours.SNS}`,
        `研修：${summary.workHours['研修']}`,
        `その他MTGなど：${summary.workHours['その他MTGなど']}`,
        `講師外業務合計：${summary.workTotalHours}`,
        '',
        '講師外業務詳細',
        ...details,
        ...notes,
      ].join('\n');
    }

    function bindWorkTotalUpdater() {
      ['editDate', 'editStart', 'editEnd'].forEach((id) => {
        const input = $(id);
        if (input) input.addEventListener('input', updateEditWorkTotal);
      });
      updateEditWorkTotal();
    }

    function updateEditWorkTotal() {
      const target = $('editWorkTotal');
      if (!target) return;
      const minutes = calculateWorkMinutes($('editDate').value, $('editStart').value, $('editEnd').value);
      target.textContent = minutes === null ? '未計算' : formatDuration(minutes);
    }

    async function saveEditedLog() {
      if (!state.editingLog || state.editSaving || state.editDeleting) return;
      const payload = buildEditPayload();
      if (!payload) return;

      try {
        state.editSaving = true;
        setEditBusy(true, '保存中...');
        const result = await gas('updateLog', payload);
        state.editingLog = null;
        $('editOverlay').classList.add('hidden');
        $('editOverlay').setAttribute('aria-hidden', 'true');
        await refreshAfterMutation(result, '勤務実績を更新しました');
      } catch (error) {
        $('editSheetError').textContent = formatError(error);
      } finally {
        state.editSaving = false;
        setEditBusy(false);
      }
    }

    function buildEditPayload() {
      const log = state.editingLog;
      const date = $('editDate') ? $('editDate').value : '';
      if (!date) {
        $('editSheetError').textContent = '日付を入力してください';
        return null;
      }

      if (log.type === 'レッスン') {
        const lessonItems = getEditLessonItemValues();
        const koma = clampKoma($('editKoma').value);
        if (lessonItems.length !== koma || lessonItems.some((item) => !item)) {
          $('editSheetError').textContent = 'コマ内容を選択してください';
          return null;
        }
        return {
          id: log.id,
          date,
          koma,
          lessonItems,
          content: lessonItems.join(' / '),
          note: $('editNote').value,
        };
      }

      const start = $('editStart').value;
      const end = $('editEnd').value;
      const content = $('editContent').value.trim();
      const category = $('editCategory').value;
      if (!start) {
        $('editSheetError').textContent = '開始時刻を入力してください';
        return null;
      }
      if (end && (!content || !category)) {
        $('editSheetError').textContent = '終了済みの講師外業務は内容と分類を入力してください';
        return null;
      }
      return {
        id: log.id,
        date,
        start,
        end,
        content,
        category,
        note: $('editNote').value,
      };
    }

    function getEditLessonItemValues() {
      return Array.from(document.querySelectorAll('.edit-lesson-item-select'))
        .map((select) => select.value)
        .filter(Boolean);
    }

    async function deleteEditedLog() {
      if (!state.editingLog || state.editSaving || state.editDeleting) return;
      if (!confirm('この勤務実績を削除しますか？この操作は元に戻せません。')) {
        return;
      }
      try {
        state.editDeleting = true;
        setEditBusy(true, '削除中...');
        const result = await gas('deleteLog', state.editingLog.id);
        state.editingLog = null;
        $('editOverlay').classList.add('hidden');
        $('editOverlay').setAttribute('aria-hidden', 'true');
        await refreshAfterMutation(result, '勤務実績を削除しました');
      } catch (error) {
        $('editSheetError').textContent = formatError(error);
      } finally {
        state.editDeleting = false;
        setEditBusy(false);
      }
    }

    function setEditBusy(isBusy, message = '') {
      $('saveEditButton').disabled = isBusy;
      $('cancelEditButton').disabled = isBusy;
      $('deleteLogButton').disabled = isBusy;
      $('editSheetSaving').textContent = message;
      $('editSheetSaving').classList.toggle('hidden', !isBusy);
      if (isBusy) {
        $('editSheetError').textContent = '';
      }
    }

    async function saveQuickItems() {
      if (state.busy) return;
      const items = Array.from(document.querySelectorAll('.quick-item-input'))
        .map((input) => input.value.trim())
        .filter(Boolean);
      try {
        setBusy(true);
        const result = await gas('saveWorkQuickItems', items);
        state.workQuickItems = result.workQuickItems || items;
        closeQuickItemsDialog();
        renderToday();
        renderWorkContentQuickButtons();
        showToast(result.message || 'クイック入力を保存しました');
      } catch (error) {
        showError(error);
      } finally {
        setBusy(false);
      }
    }

    function hasAppsScript() {
      return typeof google !== 'undefined' && google.script && google.script.run;
    }

    function gas(functionName, ...args) {
      if (!hasAppsScript()) {
        return Promise.resolve().then(() => {
          if (!localApi[functionName]) {
            throw new Error(`PCテストモードでは ${functionName} を使えません`);
          }
          return localApi[functionName](...args);
        });
      }

      return new Promise((resolve, reject) => {
        const runner = google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(reject);
        runner[functionName](...args);
      });
    }

    const localApi = {
      getInitialData() {
        const today = new Date();
        const currentMonth = toMonthValue(today);
        const logs = localReadLogs();
        return {
          todayIso: toDateIso(today),
          todayDisplay: toJapaneseDate(today),
          currentMonth,
          lessonCategories: LESSON_CATEGORIES.slice(),
          workCategories: WORK_CATEGORIES.slice(),
          lessonContentOptions: LESSON_CONTENT_OPTIONS.slice(),
          lessonItemOptions: LESSON_CONTENT_OPTIONS.slice(),
          workQuickItems: localReadQuickItems(),
          activeWork: localFindActiveWork(logs),
          historyLogs: logs
            .filter((log) => log.month === currentMonth)
            .sort(sortLogsForHistory)
            .map(cloneLog),
          monthlySummary: buildLocalMonthlySummary(currentMonth, logs),
        };
      },

      saveWorkQuickItems(items) {
        const normalized = normalizeQuickItemsClient(items);
        localStorage.setItem(LOCAL_QUICK_ITEMS_KEY, JSON.stringify(normalized));
        return {
          ok: true,
          message: 'クイック入力を保存しました（PCテスト）',
          workQuickItems: normalized,
        };
      },

      saveLesson(payload) {
        const logs = localReadLogs();
        const dateIso = payload.date || toDateIso(new Date());
        const lessonItems = normalizeLessonItemsClient(payload.lessonItems || []);
        const koma = Number(payload.koma || lessonItems.length);
        validateLessonPayload(koma, lessonItems);
        const now = new Date();
        logs.push(normalizeLocalLog({
          id: localCreateId(),
          type: 'レッスン',
          dateIso,
          start: '',
          end: '',
          content: lessonItems.join(' / '),
          category: getLocalLessonCategoryByItems(lessonItems),
          koma,
          minutes: '',
          hours: '',
          note: String(payload.note || '').trim(),
          createdDisplay: toDateTimeDisplay(now),
          updatedDisplay: toDateTimeDisplay(now),
          sortTime: now.getTime(),
          isActive: false,
        }));
        localWriteLogs(logs);
        return localMutationResult('レッスンを保存しました（PCテスト）');
      },

      startWork(payload) {
        const logs = localReadLogs();
        if (localFindActiveWork(logs)) {
          throw new Error('未終了の講師外業務があるため、先に退勤してください');
        }
        const content = String(payload && payload.content || '').trim();
        if (!content) {
          throw new Error('出勤時に内容を入力してください');
        }
        const category = WORK_CATEGORIES.includes(payload.category) ? payload.category : 'その他MTGなど';
        const now = new Date();
        logs.push(normalizeLocalLog({
          id: localCreateId(),
          type: '講師外業務',
          dateIso: toDateIso(now),
          start: toTimeText(now),
          end: '',
          content,
          category,
          koma: '',
          minutes: '',
          hours: '',
          note: String(payload.note || '').trim(),
          createdDisplay: toDateTimeDisplay(now),
          updatedDisplay: toDateTimeDisplay(now),
          sortTime: now.getTime(),
          isActive: true,
        }));
        localWriteLogs(logs);
        return localMutationResult('出勤しました（PCテスト）');
      },

      finishWork() {
        const logs = localReadLogs();
        const active = localFindActiveWork(logs);
        if (!active) {
          throw new Error('開始中の講師外業務がありません');
        }
        const now = new Date();
        active.end = toTimeText(now);
        active.minutes = calculateWorkMinutes(active.dateIso, active.start, active.end) || 0;
        active.hours = roundHoursClient(active.minutes).toFixed(2);
        active.isActive = false;
        active.updatedDisplay = toDateTimeDisplay(now);
        active.sortTime = now.getTime();
        localWriteLogs(logs);
        return localMutationResult('退勤しました（PCテスト）');
      },

      cancelActiveWork() {
        const logs = localReadLogs();
        const active = localFindActiveWork(logs);
        if (!active) {
          throw new Error('取り消せる未退勤の出勤がありません');
        }
        localWriteLogs(logs.filter((log) => log.id !== active.id));
        return localMutationResult('出勤を取り消しました（PCテスト）');
      },

      getLogsByMonth(month) {
        validateMonth(month);
        return localReadLogs()
          .filter((log) => log.month === month)
          .sort(sortLogsForHistory)
          .map(cloneLog);
      },

      getMonthlySummary(month) {
        return buildLocalMonthlySummary(month);
      },

      updateLog(payload) {
        const logs = localReadLogs();
        const log = logs.find((item) => String(item.id) === String(payload.id));
        if (!log) {
          throw new Error('編集対象のログが見つかりません');
        }
        if (!/^\d{4}-\d{2}-\d{2}$/.test(payload.date || '')) {
          throw new Error('日付を入力してください');
        }
        const now = new Date();
        if (log.type === 'レッスン') {
          const lessonItems = normalizeLessonItemsClient(payload.lessonItems || []);
          const koma = Number(payload.koma || lessonItems.length);
          validateLessonPayload(koma, lessonItems);
          log.dateIso = payload.date;
          log.content = lessonItems.join(' / ');
          log.category = getLocalLessonCategoryByItems(lessonItems);
          log.koma = koma;
          log.minutes = '';
          log.hours = '';
          log.note = String(payload.note || '').trim();
        } else {
          const start = normalizeTimeTextClient(payload.start);
          const end = normalizeTimeTextClient(payload.end);
          const content = String(payload.content || '').trim();
          const category = payload.category || '';
          if (!start) throw new Error('開始時刻を入力してください');
          if (end && (!content || !WORK_CATEGORIES.includes(category))) {
            throw new Error('終了済みの講師外業務は内容と分類を入力してください');
          }
          log.dateIso = payload.date;
          log.start = start;
          log.end = end;
          log.content = content;
          log.category = category;
          log.koma = '';
          log.note = String(payload.note || '').trim();
          log.isActive = Boolean(start && !end);
          if (end) {
            const minutes = calculateWorkMinutes(log.dateIso, start, end);
            if (minutes === null) throw new Error('勤務時間を計算できませんでした');
            log.minutes = minutes;
            log.hours = roundHoursClient(minutes).toFixed(2);
          } else {
            log.minutes = '';
            log.hours = '';
          }
        }
        log.dateDisplay = displayDateFromIso(log.dateIso);
        log.month = log.dateIso.slice(0, 7);
        log.updatedDisplay = toDateTimeDisplay(now);
        log.sortTime = now.getTime();
        localWriteLogs(logs.map(normalizeLocalLog));
        return localMutationResult('ログを更新しました（PCテスト）');
      },

      deleteLog(id) {
        const logs = localReadLogs();
        const nextLogs = logs.filter((log) => String(log.id) !== String(id));
        if (nextLogs.length === logs.length) {
          throw new Error('削除対象のログが見つかりません');
        }
        localWriteLogs(nextLogs);
        return localMutationResult('ログを削除しました（PCテスト）');
      },
    };

    function localMutationResult(message) {
      return {
        ok: true,
        message,
        activeWork: localFindActiveWork(),
        recentLogs: localGetRecentLogs(),
        salarySummary: buildLocalSalarySummary(toMonthValue(new Date())),
      };
    }

    function localReadLogs() {
      try {
        const parsed = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY) || '[]');
        return Array.isArray(parsed) ? parsed.map(normalizeLocalLog).filter((log) => log.id) : [];
      } catch (error) {
        return [];
      }
    }

    function localWriteLogs(logs) {
      localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(logs.map(normalizeLocalLog)));
    }

    function normalizeLocalLog(log) {
      const dateIso = log.dateIso || isoFromDisplayDate(log.dateDisplay) || toDateIso(new Date());
      const start = normalizeTimeTextClient(log.start);
      const end = normalizeTimeTextClient(log.end);
      const normalized = Object.assign({}, log, {
        id: String(log.id || ''),
        type: log.type || '講師外業務',
        dateIso,
        dateDisplay: displayDateFromIso(dateIso),
        month: dateIso.slice(0, 7),
        start,
        end,
        content: String(log.content || ''),
        category: String(log.category || ''),
        koma: log.koma === '' ? '' : Number(log.koma || 0),
        minutes: log.minutes === '' || typeof log.minutes === 'undefined' ? '' : Number(log.minutes || 0),
        hours: log.hours === '' || typeof log.hours === 'undefined' ? '' : Number(log.hours || 0).toFixed(2),
        note: String(log.note || ''),
        isActive: log.type === '講師外業務' && Boolean(start && !end),
        sortTime: Number(log.sortTime || 0),
      });
      normalized.lessonItems = normalized.type === 'レッスン' ? getLogLessonItems(normalized) : [];
      return normalized;
    }

    function localReadQuickItems() {
      try {
        const stored = localStorage.getItem(LOCAL_QUICK_ITEMS_KEY);
        if (stored === null) return DEFAULT_WORK_QUICK_ITEMS.slice();
        const parsed = JSON.parse(stored);
        return Array.isArray(parsed) ? normalizeQuickItemsClient(parsed) : DEFAULT_WORK_QUICK_ITEMS.slice();
      } catch (error) {
        return DEFAULT_WORK_QUICK_ITEMS.slice();
      }
    }

    function localFindActiveWork(logs = localReadLogs()) {
      return logs.find((log) => log.type === '講師外業務' && log.start && !log.end) || null;
    }

    function localGetRecentLogs(logs = localReadLogs()) {
      return logs
        .map((log, index) => Object.assign({ fallbackSortTime: index }, log))
        .sort((a, b) => (Number(b.sortTime || 0) - Number(a.sortTime || 0)) || (b.fallbackSortTime - a.fallbackSortTime))
        .slice(0, 5);
    }

    function localCreateId() {
      return `${Date.now()}-${Math.floor(Math.random() * 100000)}`;
    }

    function buildLocalMonthlySummary(month, sourceLogs = localReadLogs()) {
      validateMonth(month);
      const monthLabel = `${Number(month.slice(0, 4))}年${Number(month.slice(5, 7))}月`;
      const summary = {
        month,
        monthLabel,
        normalKoma: 0,
        campKoma: 0,
        camp10Koma: 0,
        otherConfirmKoma: 0,
        lessonTotalKoma: 0,
        workMinutes: { '教材開発': 0, SNS: 0, '研修': 0, 'その他MTGなど': 0 },
        workHours: { '教材開発': '0.00', SNS: '0.00', '研修': '0.00', 'その他MTGなど': '0.00' },
        workTotalMinutes: 0,
        workTotalHours: '0.00',
        unclassifiedCount: 0,
        unfinishedCount: 0,
        otherConfirmCount: 0,
        details: [],
        confirmNotes: [],
        warnings: [],
      };

      sourceLogs.filter((log) => log.month === month).forEach((log) => {
        if (log.type === 'レッスン') {
          const contents = getLogLessonItems(log);
          if (!contents.length) {
            summary.unclassifiedCount += 1;
            summary.confirmNotes.push(`未分類: ${log.dateDisplay} レッスン ${log.content || '内容なし'}`);
            return;
          }
          contents.forEach((content) => {
            const category = getLessonBillingCategoryClient(content);
            if (category === '通常コマ') {
              summary.normalKoma += 1;
            } else if (category === 'キャンプ') {
              summary.campKoma += 1;
              summary.camp10Koma = summary.campKoma;
            } else {
              summary.otherConfirmKoma += 1;
              summary.otherConfirmCount += 1;
              summary.confirmNotes.push(`その他・要確認: ${log.dateDisplay} ${content}${log.note ? ` / メモ: ${log.note}` : ''}`);
            }
          });
          return;
        }

        if (!log.end) {
          summary.unfinishedCount += 1;
          summary.confirmNotes.push(`終了漏れ: ${log.dateDisplay} ${log.start || '--:--'}開始 ${log.content || '内容未入力'}`);
          return;
        }
        if (!WORK_CATEGORIES.includes(log.category)) {
          summary.unclassifiedCount += 1;
          summary.confirmNotes.push(`未分類: ${log.dateDisplay} 講師外業務 ${log.content || '内容なし'}`);
          return;
        }
        const minutes = getLogMinutes(log);
        summary.workMinutes[log.category] += minutes;
        summary.details.push({
          date: log.dateDisplay,
          shortDate: shortDateFromIso(log.dateIso),
          start: log.start,
          end: log.end,
          content: log.content,
          category: log.category,
          minutes,
          hours: roundHoursClient(minutes).toFixed(2),
          note: log.note || '',
        });
      });

      summary.camp10Koma = summary.campKoma;
      summary.lessonTotalKoma = summary.normalKoma + summary.campKoma;
      Object.keys(summary.workMinutes).forEach((category) => {
        const minutes = summary.workMinutes[category];
        summary.workTotalMinutes += minutes;
        summary.workHours[category] = roundHoursClient(minutes).toFixed(2);
      });
      summary.workTotalHours = roundHoursClient(summary.workTotalMinutes).toFixed(2);
      summary.salarySummary = buildLocalSalarySummary(month, sourceLogs);
      if (summary.otherConfirmCount > 0) summary.warnings.push('その他・要確認のレッスンがあります。内容を確認してください。');
      if (summary.unfinishedCount > 0) summary.warnings.push('終了漏れの講師外業務があります。勤怠ログを確認してください。');
      if (summary.unclassifiedCount > 0) summary.warnings.push('未分類のログがあります。分類を確認してください。');
      return summary;
    }

    function buildLocalSalarySummary(month, sourceLogs = localReadLogs()) {
      validateMonth(month);
      const summary = {
        month,
        monthLabel: `${Number(month.slice(0, 4))}年${Number(month.slice(5, 7))}月`,
        lessonKoma: 0,
        normalLessonKoma: 0,
        campLessonKoma: 0,
        workMinutes: 0,
        workHours: '0.00',
        lessonPay: 0,
        workPay: 0,
        totalPay: 0,
        lessonPayPerKoma: LESSON_PAY_PER_KOMA,
        campLessonPayPerKoma: CAMP_LESSON_PAY_PER_KOMA,
        workHourlyPay: WORK_HOURLY_PAY,
      };

      sourceLogs.filter((log) => log.month === month).forEach((log) => {
        if (log.type === 'レッスン') {
          const lessonItems = getLogLessonItems(log);
          lessonItems.forEach((item) => {
            const category = getLessonBillingCategoryClient(item);
            summary.lessonKoma += 1;
            if (category === 'キャンプ') {
              summary.campLessonKoma += 1;
            } else if (category === '通常コマ') {
              summary.normalLessonKoma += 1;
            }
          });
          return;
        }
        if (log.type === '講師外業務' && log.end) {
          summary.workMinutes += getLogMinutes(log);
        }
      });

      summary.workHours = roundHoursClient(summary.workMinutes).toFixed(2);
      summary.lessonPay =
        (summary.normalLessonKoma * LESSON_PAY_PER_KOMA) +
        (summary.campLessonKoma * CAMP_LESSON_PAY_PER_KOMA);
      summary.workPay = Math.round((summary.workMinutes * WORK_HOURLY_PAY) / 60);
      summary.totalPay = summary.lessonPay + summary.workPay;
      return summary;
    }

    function fillSelect(select, values) {
      clear(select);
      values.forEach((value) => {
        const option = document.createElement('option');
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    function groupLogsByDate(logs) {
      const groups = [];
      const byDate = new Map();
      logs.forEach((log) => {
        const key = log.dateIso || log.dateDisplay || '';
        if (!byDate.has(key)) {
          const group = { dateIso: log.dateIso, dateDisplay: log.dateDisplay, logs: [] };
          byDate.set(key, group);
          groups.push(group);
        }
        byDate.get(key).logs.push(log);
      });
      return groups;
    }

    function sortLogsForHistory(a, b) {
      const dateCompare = String(b.dateIso || '').localeCompare(String(a.dateIso || ''));
      if (dateCompare !== 0) return dateCompare;
      return getLogSortMinutes(b) - getLogSortMinutes(a) || Number(b.sortTime || 0) - Number(a.sortTime || 0);
    }

    function getLogSortMinutes(log) {
      const time = normalizeTimeTextClient(log.start || log.end || '');
      if (!time) return -1;
      const [hour, minute] = time.split(':').map(Number);
      return hour * 60 + minute;
    }

    function getLogLessonItems(log) {
      if (Array.isArray(log.lessonItems) && log.lessonItems.length) {
        return log.lessonItems.map(normalizeLessonContentClient).filter(Boolean).slice(0, clampKoma(log.koma || log.lessonItems.length));
      }
      const expected = clampKoma(log.koma || 1);
      const values = String(log.content || '')
        .split('/')
        .map((item) => normalizeLessonContentClient(item))
        .filter(Boolean);
      if (values.length) return values.slice(0, expected);
      const fallback = log.category === 'キャンプ' || log.category === 'キャンプ10時'
        ? 'キャンプ'
        : log.category === 'その他・要確認'
          ? 'その他・要確認'
          : 'CB';
      return Array.from({ length: expected }, () => fallback);
    }

    function getLogMinutes(log) {
      if (log.minutes !== '' && typeof log.minutes !== 'undefined' && !Number.isNaN(Number(log.minutes))) {
        return Number(log.minutes);
      }
      return calculateWorkMinutes(log.dateIso, log.start, log.end) || 0;
    }

    function calculateWorkMinutes(dateIso, start, end) {
      if (!dateIso || !start || !end) return null;
      const startAt = buildClientDateTime(dateIso, start);
      const endAt = buildClientDateTime(dateIso, end);
      if (!startAt || !endAt) return null;
      if (endAt.getTime() < startAt.getTime()) {
        endAt.setDate(endAt.getDate() + 1);
      }
      return Math.round((endAt.getTime() - startAt.getTime()) / 60000);
    }

    function buildClientDateTime(dateIso, timeText) {
      if (!/^\d{4}-\d{2}-\d{2}$/.test(dateIso || '') || !normalizeTimeTextClient(timeText)) {
        return null;
      }
      const [year, month, day] = dateIso.split('-').map(Number);
      const [hour, minute] = normalizeTimeTextClient(timeText).split(':').map(Number);
      return new Date(year, month - 1, day, hour, minute, 0, 0);
    }

    function validateLessonPayload(koma, lessonItems) {
      if (!koma || koma < 1 || koma > 4) {
        throw new Error('コマ数は1から4の範囲で選んでください');
      }
      if (!Array.isArray(lessonItems) || lessonItems.length !== koma || lessonItems.some((item) => !item)) {
        throw new Error('コマ数とコマ内容の数が一致していません');
      }
    }

    function validateMonth(month) {
      if (!/^\d{4}-\d{2}$/.test(month || '')) {
        throw new Error('対象月を選択してください');
      }
    }

    function normalizeLessonItemsClient(items) {
      return (Array.isArray(items) ? items : []).map(normalizeLessonContentClient).filter(Boolean);
    }

    function normalizeLessonContentClient(value) {
      const text = String(value || '').trim();
      const normalized = LESSON_CONTENT_ALIASES[text] || text;
      return LESSON_CONTENT_OPTIONS.includes(normalized) ? normalized : '';
    }

    function getLessonBillingCategoryClient(content) {
      const normalized = normalizeLessonContentClient(content);
      return LESSON_BILLING_RULES[normalized] || 'その他・要確認';
    }

    function getLocalLessonCategoryByItems(items) {
      const categories = items.map(getLessonBillingCategoryClient);
      if (categories.some((category) => category === 'その他・要確認')) return 'その他・要確認';
      const hasCamp = categories.some((category) => category === 'キャンプ');
      const hasNormal = categories.some((category) => category === '通常コマ');
      return hasCamp && !hasNormal ? 'キャンプ' : '通常コマ';
    }

    function normalizeQuickItemsClient(items) {
      const seen = new Set();
      return (Array.isArray(items) ? items : [])
        .map((item) => String(item || '').trim().slice(0, 40))
        .filter((item) => {
          if (!item || seen.has(item)) return false;
          seen.add(item);
          return true;
        })
        .slice(0, 4);
    }

    function normalizeTimeTextClient(value) {
      const match = String(value || '').trim().match(/^(\d{1,2}):(\d{2})$/);
      if (!match) return '';
      const hour = Number(match[1]);
      const minute = Number(match[2]);
      if (hour < 0 || hour > 23 || minute < 0 || minute > 59) return '';
      return `${pad2(hour)}:${pad2(minute)}`;
    }

    function formatElapsed(seconds) {
      const hours = Math.floor(seconds / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      const secs = seconds % 60;
      return `${pad2(hours)}:${pad2(minutes)}:${pad2(secs)}`;
    }

    function formatDuration(minutes) {
      const value = Math.max(0, Number(minutes || 0));
      const hours = Math.floor(value / 60);
      const mins = value % 60;
      if (hours && mins) return `${hours}時間${mins}分`;
      if (hours) return `${hours}時間`;
      return `${mins}分`;
    }

    function formatHoursLabel(hours) {
      const minutes = Math.round(Number(hours || 0) * 60);
      return formatDuration(minutes);
    }

    function formatDecimalHours(hours) {
      return Number(hours || 0).toFixed(2);
    }

    function formatYen(value) {
      return `¥${Number(value || 0).toLocaleString('ja-JP')}`;
    }

    function formatDateHeading(dateIso, fallback) {
      if (!/^\d{4}-\d{2}-\d{2}$/.test(dateIso || '')) return fallback || '';
      const [year, month, day] = dateIso.split('-').map(Number);
      const date = new Date(year, month - 1, day);
      const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
      return `${month}月${day}日 ${weekdays[date.getDay()]}曜日`;
    }

    function addWeekdayToDisplay(dateIso, display) {
      if (!/^\d{4}-\d{2}-\d{2}$/.test(dateIso || '')) return display || '';
      const [year, month, day] = dateIso.split('-').map(Number);
      const date = new Date(year, month - 1, day);
      const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
      return `${month}月${day}日 ${weekdays[date.getDay()]}曜日`;
    }

    function getSummaryConfirmCount(summary) {
      return Number(summary.unclassifiedCount || 0) + Number(summary.unfinishedCount || 0) + Number(summary.otherConfirmCount || 0);
    }

    function getSummaryCampKoma(summary) {
      return Number(summary.campKoma || summary.camp10Koma || 0);
    }

    function clampKoma(value) {
      const number = Number(value || 1);
      if (number < 1) return 1;
      if (number > 4) return 4;
      return number;
    }

    function cloneLog(log) {
      return JSON.parse(JSON.stringify(log || {}));
    }

    function toDateIso(date) {
      return `${date.getFullYear()}-${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`;
    }

    function toMonthValue(date) {
      return `${date.getFullYear()}-${pad2(date.getMonth() + 1)}`;
    }

    function toJapaneseDate(date) {
      return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
    }

    function toDateTimeDisplay(date) {
      return `${displayDateFromIso(toDateIso(date))} ${toTimeText(date)}`;
    }

    function displayDateFromIso(dateIso) {
      const [year, month, day] = String(dateIso || '').split('-');
      return year && month && day ? `${year}/${month}/${day}` : '';
    }

    function isoFromDisplayDate(display) {
      const match = String(display || '').match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/);
      if (!match) return '';
      return `${match[1]}-${pad2(match[2])}-${pad2(match[3])}`;
    }

    function shortDateFromIso(dateIso) {
      const [, month, day] = String(dateIso || '').split('-');
      return month && day ? `${Number(month)}/${Number(day)}` : '';
    }

    function toTimeText(date) {
      return `${pad2(date.getHours())}:${pad2(date.getMinutes())}`;
    }

    function pad2(value) {
      return String(value).padStart(2, '0');
    }

    function roundHoursClient(minutes) {
      return Math.round((Number(minutes || 0) / 60) * 100) / 100;
    }

    function capitalize(value) {
      return String(value || '').charAt(0).toUpperCase() + String(value || '').slice(1);
    }

    function chevronIcon() {
      const span = createEl('span', { className: 'chevron-icon', ariaHidden: 'true' });
      span.innerHTML = '<svg class="icon" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"></path></svg>';
      return span;
    }

    function setBusy(isBusy) {
      state.busy = isBusy;
      document.querySelectorAll('button:not([data-tab])').forEach((button) => {
        if (button.id === 'saveEditButton' || button.id === 'cancelEditButton' || button.id === 'deleteLogButton') return;
        button.disabled = isBusy;
      });
      $('copyTextButton').disabled = isBusy || !state.summary;
    }

    function showToast(message, isError = false) {
      const toast = $('toast');
      toast.textContent = message;
      toast.classList.toggle('error', isError);
      toast.classList.add('show');
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove('show'), 3800);
    }

    function showError(error) {
      showToast(formatError(error), true);
    }

    function formatError(error) {
      return (error && error.message ? error.message : String(error || 'エラーが発生しました')).replace(/^Exception:\s*/, '');
    }

    function createEl(tagName, attrs = {}, children = []) {
      const element = document.createElement(tagName);
      Object.entries(attrs || {}).forEach(([key, value]) => {
        if (value === null || typeof value === 'undefined') return;
        if (key === 'className') {
          element.className = value;
        } else if (key === 'htmlFor') {
          element.htmlFor = value;
        } else if (key === 'ariaLabel') {
          element.setAttribute('aria-label', value);
        } else if (key === 'ariaHidden') {
          element.setAttribute('aria-hidden', String(value));
        } else if (key === 'style') {
          element.setAttribute('style', value);
        } else if (key in element) {
          element[key] = value;
        } else {
          element.setAttribute(key, value);
        }
      });
      const childList = Array.isArray(children) ? children : [children];
      childList.forEach((child) => {
        if (child === null || typeof child === 'undefined') return;
        if (typeof child === 'string' || typeof child === 'number') {
          element.appendChild(document.createTextNode(String(child)));
        } else {
          element.appendChild(child);
        }
      });
      return element;
    }

    function clear(element) {
      while (element && element.firstChild) {
        element.removeChild(element.firstChild);
      }
    }

    function $(id) {
      return document.getElementById(id);
    }
  </script>
</body>
